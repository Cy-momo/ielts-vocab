<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雅思词汇真经</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
header{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;padding:10px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
header h1{font-size:1.1em;white-space:nowrap}
.stats{display:flex;gap:12px;font-size:.8em;flex-wrap:wrap}
.stats span{background:rgba(255,255,255,.15);padding:3px 10px;border-radius:12px}

nav{display:flex;gap:4px;flex-wrap:wrap}
nav button{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);padding:5px 10px;border-radius:5px;cursor:pointer;font-size:.8em;transition:all .2s}
nav button:hover,nav button.active{background:#e94560;border-color:#e94560}

.toolbar{display:flex;gap:6px;padding:10px 16px;background:#fff;border-bottom:1px solid #e0e0e0;flex-wrap:wrap;align-items:center;position:sticky;top:60px;z-index:99}
.toolbar input,.toolbar select{padding:7px 10px;border:1px solid #ddd;border-radius:5px;font-size:.85em;outline:none}
.toolbar input:focus,.toolbar select:focus{border-color:#0f3460}
.toolbar input{flex:1;min-width:120px}
.toolbar select{min-width:100px}
.toolbar button{padding:7px 14px;border:1px solid #0f3460;background:#fff;color:#0f3460;border-radius:5px;cursor:pointer;font-size:.8em;transition:all .2s;white-space:nowrap}
.toolbar button:hover{background:#0f3460;color:#fff}
.toolbar button.primary{background:#0f3460;color:#fff}
.toolbar button.danger{border-color:#e94560;color:#e94560}
.toolbar button.danger:hover{background:#e94560;color:#fff}
.toolbar button.mode-btn{border-color:#ff9800;color:#ff9800}
.toolbar button.mode-btn.rev{border-color:#9c27b0;color:#9c27b0}

.panel{display:none}
.panel.active{display:block}
main{padding:16px;max-width:800px;margin:0 auto}

/* ── Flashcard ── */
.progress-bar{height:4px;background:#e0e0e0;border-radius:2px;margin-bottom:16px;overflow:hidden}
.progress-bar .fill{height:100%;background:#0f3460;transition:width .3s}
.card-container{perspective:1000px;margin:0 auto 16px;max-width:360px;cursor:pointer}
.card{position:relative;width:100%;height:220px;transition:transform .5s;transform-style:preserve-3d}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.card-front{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.card-back{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;transform:rotateY(180deg)}
.card-face .word{font-size:1.8em;font-weight:700;margin-bottom:6px;word-break:break-word}
.card-face .phonetic{font-size:.95em;opacity:.85;margin-bottom:4px}
.card-face .pos-badge{display:inline-block;background:rgba(255,255,255,.25);padding:2px 8px;border-radius:10px;font-size:.75em;margin-bottom:6px}
.card-face .meaning{font-size:1.3em;margin-bottom:4px}
.card-face .chapter-tag{font-size:.75em;opacity:.7;margin-top:auto}
.card-face .notes-hint{font-size:.8em;opacity:.6;margin-top:4px;font-style:italic}
.card-hint{text-align:center;color:#999;font-size:.8em;margin-bottom:12px}
.card-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.card-actions button{padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:.9em;font-weight:600;transition:all .2s}
.btn-prev{background:#607d8b;color:#fff}
.btn-dunno{background:#ff9800;color:#fff}
.btn-know{background:#4caf50;color:#fff}
.btn-skip{background:#9e9e9e;color:#fff}
.card-actions button:active{transform:scale(.95)}

/* ── List ── */
.list-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;font-size:.85em}
.list-table th{background:#0f3460;color:#fff;padding:10px 8px;text-align:left;font-weight:500;position:sticky;top:120px;z-index:10}
.list-table td{padding:8px;border-bottom:1px solid #eee}
.list-table tr.known{opacity:.4;text-decoration:line-through}
.list-table tr:hover{background:#f5f5f5}
.list-table .btn-toggle{padding:4px 10px;border:1px solid #0f3460;border-radius:4px;cursor:pointer;font-size:.75em;background:#fff;color:#0f3460}
.list-table .btn-toggle.known{background:#4caf50;color:#fff;border-color:#4caf50}
.pagination{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.pagination button{padding:6px 14px;border:1px solid #ddd;background:#fff;border-radius:5px;cursor:pointer;font-size:.85em}
.pagination button.active{background:#0f3460;color:#fff;border-color:#0f3460}
.pagination button:disabled{opacity:.3}
.word-clickable{cursor:pointer;color:#0f3460;font-weight:500}
.word-clickable:hover{text-decoration:underline}

/* ── Chapters ── */
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.ch-card{background:#fff;border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all .2s;border:2px solid transparent}
.ch-card:hover{border-color:#0f3460;transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.ch-card .ch-num{font-size:.75em;color:#999}
.ch-card .ch-name{font-size:1em;font-weight:600;margin:6px 0}
.ch-card .ch-count{font-size:.8em;color:#666}
.ch-card .ch-bar{height:4px;background:#e0e0e0;border-radius:2px;margin-top:8px;overflow:hidden}
.ch-card .ch-bar-fill{height:100%;background:#4caf50;transition:width .3s}

/* ── Synonyms ── */
.syn-chapter-select{margin-bottom:16px}
.syn-group{background:#fff;border-radius:10px;margin-bottom:12px;overflow:hidden;border:1px solid #e0e0e0}
.syn-group-header{padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:#fafafa}
.syn-group-header:hover{background:#f0f0f0}
.syn-group-header h3{font-size:.95em;color:#333}
.syn-group-header .arrow{transition:transform .3s;color:#999}
.syn-group.open .syn-group-header .arrow{transform:rotate(180deg)}
.syn-group-body{display:none;padding:12px 16px;border-top:1px solid #e0e0e0}
.syn-group.open .syn-group-body{display:block}
.syn-explanation{font-size:.85em;color:#666;margin-bottom:10px;line-height:1.6}
.syn-word-item{display:flex;align-items:baseline;gap:8px;padding:6px 0;border-bottom:1px dotted #eee;font-size:.85em}
.syn-word-item:last-child{border-bottom:none}
.syn-word-item .syn-word{font-weight:600;color:#0f3460;min-width:100px;cursor:pointer}
.syn-word-item .syn-word:hover{text-decoration:underline}
.syn-word-item .syn-diff{color:#666;flex:1}

.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 24px;border-radius:20px;font-size:.85em;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:480px){
  header h1{font-size:1em}
  .card-face .word{font-size:1.5em}
  .card-face .meaning{font-size:1.1em}
  .ch-grid{grid-template-columns:repeat(2,1fr)}
  .toolbar{top:50px}
  nav button{padding:4px 8px;font-size:.75em}
}
</style>
</head>
<body>

<header>
  <h1>雅思词汇真经</h1>
  <div class="stats">
    <span id="stat-total"></span>
    <span id="stat-known"></span>
    <span id="stat-remain"></span>
  </div>
  <nav>
    <button onclick="switchPanel('flashcard')" id="nav-flashcard" class="active">卡片</button>
    <button onclick="switchPanel('list')" id="nav-list">列表</button>
    <button onclick="switchPanel('chapters')" id="nav-chapters">章节</button>
    <button onclick="switchPanel('synonyms')" id="nav-synonyms">近义词</button>
  </nav>
</header>

<div class="toolbar">
  <input type="text" id="search-input" placeholder="搜索单词或释义..." oninput="onFilterChange()">
  <select id="chapter-filter" onchange="onFilterChange()">
    <option value="">全部章节</option>
  </select>
  <select id="known-filter" onchange="onFilterChange()">
    <option value="all">全部状态</option>
    <option value="unknown">未掌握</option>
    <option value="known">已掌握</option>
  </select>
  <button class="primary" onclick="shuffleCards()">随机</button>
  <button class="mode-btn" id="mode-toggle" onclick="toggleMode()">中→英</button>
  <button onclick="exportProgress()">导出</button>
  <button onclick="document.getElementById('import-file').click()">导入</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importProgress(event)">
  <button class="danger" onclick="resetProgress()">重置</button>
</div>

<main>
  <!-- Flashcard Panel -->
  <div id="panel-flashcard" class="panel active">
    <div class="progress-bar"><div class="fill" id="progress-fill" style="width:0%"></div></div>
    <div class="card-container" onclick="flipCard()">
      <div class="card" id="card">
        <div class="card-face card-front">
          <div class="word" id="card-word"></div>
          <div id="card-phonetic" class="phonetic"></div>
          <div id="card-pos" class="pos-badge" style="display:none"></div>
          <div class="chapter-tag" id="card-chapter"></div>
        </div>
        <div class="card-face card-back">
          <div class="meaning" id="card-meaning"></div>
          <div id="card-notes" class="notes-hint"></div>
          <div class="chapter-tag" id="card-chapter2"></div>
        </div>
      </div>
    </div>
    <div class="card-hint" id="card-hint">点击卡片翻转 | ← 不熟 → 已掌握 ↓ 跳过</div>
    <div class="card-actions">
      <button class="btn-prev" onclick="prevCard()">上一张</button>
      <button class="btn-dunno" onclick="markWord('unknown');nextCard()">还不熟</button>
      <button class="btn-know" onclick="markWord('known');nextCard()">已掌握</button>
      <button class="btn-skip" onclick="nextCard()">跳过</button>
    </div>
  </div>

  <!-- List Panel -->
  <div id="panel-list" class="panel">
    <table class="list-table">
      <thead><tr><th>单词</th><th>音标</th><th>释义</th><th>章节</th><th>操作</th></tr></thead>
      <tbody id="list-body"></tbody>
    </table>
    <div class="pagination" id="list-pagination"></div>
  </div>

  <!-- Chapters Panel -->
  <div id="panel-chapters" class="panel">
    <div class="ch-grid" id="ch-grid"></div>
  </div>

  <!-- Synonyms Panel -->
  <div id="panel-synonyms" class="panel">
    <select class="syn-chapter-select" id="syn-chapter-select" onchange="renderSynonyms()">
      <option value="">选择章节...</option>
    </select>
    <div id="syn-content"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>

// ── localStorage ──
const STORAGE_KEY = 'ielts_zhenjing_known_v1';
function loadKnown(){try{return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY))||[])}catch{return new Set()}}
function saveKnown(s){localStorage.setItem(STORAGE_KEY,JSON.stringify([...s]))}

let knownSet = loadKnown();
let currentPanel = 'flashcard';
let currentIndex = 0;
let filteredWords = [...WORDS];
let shuffledIndices = [];
let listPage = 1;
const PAGE_SIZE = 50;
let reverseMode = false;

// ── Init ──
function init(){
  // Populate chapter filter
  const cf = document.getElementById('chapter-filter');
  for(const [ch, info] of Object.entries(CHAPTERS)){
    cf.appendChild(createOpt(ch, '第'+ch+'章 '+info.n));
  }

  // Populate synonym chapter selector
  const sc = document.getElementById('syn-chapter-select');
  for(const ch of Object.keys(SYNONYMS).sort((a,b)=>a-b)){
    sc.appendChild(createOpt(ch, '第'+ch+'章 '+CHAPTERS[ch].n));
  }

  shuffleCards();
  updateStats();
}
function createOpt(v,t){const o=document.createElement('option');o.value=v;o.textContent=t;return o}

// ── Filter ──
function applyFilters(){
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const ch = document.getElementById('chapter-filter').value;
  const known = document.getElementById('known-filter').value;
  filteredWords = WORDS.filter(w => {
    if(q && !w.w.toLowerCase().includes(q) && !w.d.includes(q)) return false;
    if(ch && String(w.c) !== ch) return false;
    if(known === 'known' && !knownSet.has(w.i)) return false;
    if(known === 'unknown' && knownSet.has(w.i)) return false;
    return true;
  });
}
function onFilterChange(){applyFilters();if(currentPanel==='flashcard')shuffleCards();else if(currentPanel==='list'){listPage=1;renderList()}updateStats()}

// ── Panel ──
function switchPanel(name){
  currentPanel = name;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='flashcard'){applyFilters();shuffleCards()}
  else if(name==='list'){applyFilters();listPage=1;renderList()}
  else if(name==='chapters')renderChapters();
  else if(name==='synonyms')renderSynonyms();
}

// ── Card ──
function shuffleCards(){
  applyFilters();
  shuffledIndices = filteredWords.map(w=>w.i).sort(()=>Math.random()-.5);
  currentIndex = 0;
  renderCard();
}
function flipCard(){document.getElementById('card').classList.toggle('flipped')}
function prevCard(){if(currentIndex>0){currentIndex--;renderCard()}}
function nextCard(){
  currentIndex++;
  if(currentIndex>=shuffledIndices.length){shuffledIndices=shuffledIndices.sort(()=>Math.random()-.5);currentIndex=0}
  renderCard();
}

function renderCard(){
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  if(shuffledIndices.length===0){
    document.getElementById('card-word').textContent='没有匹配的单词';
    document.getElementById('card-meaning').textContent='';
    document.getElementById('card-phonetic').textContent='';
    document.getElementById('card-pos').style.display='none';
    document.getElementById('card-chapter').textContent='';
    return;
  }
  const wi = shuffledIndices[currentIndex];
  const w = WORDS[wi];
  const chName = CHAPTERS[w.c] ? CHAPTERS[w.c].n : '';

  if(reverseMode){
    document.getElementById('card-word').textContent = w.d;
    document.getElementById('card-meaning').textContent = w.w;
    document.getElementById('card-phonetic').textContent = '';
  } else {
    document.getElementById('card-word').textContent = w.w;
    document.getElementById('card-meaning').textContent = w.d;
    document.getElementById('card-phonetic').textContent = w.p ? '/'+w.p+'/' : '';
  }
  document.getElementById('card-pos').style.display = w.pos ? 'inline-block' : 'none';
  if(w.pos) document.getElementById('card-pos').textContent = w.pos;
  document.getElementById('card-chapter').textContent = '第'+w.c+'章 '+chName + (w.l?' List '+w.l:'');
  document.getElementById('card-chapter2').textContent = document.getElementById('card-chapter').textContent;
  document.getElementById('card-notes').textContent = w.nt || '';

  const fill = document.getElementById('progress-fill');
  fill.style.width = (shuffledIndices.length>0 ? (currentIndex+1)/shuffledIndices.length*100 : 0)+'%';
  updateStats();
}

function markWord(status){
  if(shuffledIndices.length===0) return;
  const idx = shuffledIndices[currentIndex];
  if(status==='known') knownSet.add(idx);
  else knownSet.delete(idx);
  saveKnown(knownSet);
}

// ── Reverse Mode ──
function toggleMode(){
  reverseMode = !reverseMode;
  const btn = document.getElementById('mode-toggle');
  const hint = document.getElementById('card-hint');
  if(reverseMode){btn.textContent='英→中';btn.classList.add('rev');hint.textContent='点击卡片翻转查看英文'}
  else{btn.textContent='中→英';btn.classList.remove('rev');hint.textContent='点击卡片翻转 | ← 不熟 → 已掌握 ↓ 跳过'}
  renderCard();
}

// ── List ──
function renderList(){
  applyFilters();
  const totalPages = Math.ceil(filteredWords.length/PAGE_SIZE);
  const start = (listPage-1)*PAGE_SIZE;
  const page = filteredWords.slice(start, start+PAGE_SIZE);

  let html = '';
  for(const w of page){
    const known = knownSet.has(w.i);
    const chName = CHAPTERS[w.c] ? CHAPTERS[w.c].n : '';
    html += '<tr class="'+(known?'known':'')+'">';
    html += '<td><span class="word-clickable" onclick="jumpToCard('+w.i+')">'+esc(w.w)+'</span></td>';
    html += '<td>'+(w.p?'/'+esc(w.p)+'/':'')+'</td>';
    html += '<td>'+esc(w.d)+(w.nt?' <small>'+esc(w.nt)+'</small>':'')+'</td>';
    html += '<td>第'+w.c+'章 '+esc(chName)+'</td>';
    html += '<td><button class="btn-toggle'+(known?' known':'')+'" onclick="toggleListWord('+w.i+')">'+(known?'已掌握':'待复习')+'</button></td>';
    html += '</tr>';
  }
  document.getElementById('list-body').innerHTML = html;

  // Pagination
  let phtml = '<button onclick="listPage=1;renderList()" '+(listPage===1?'disabled':'')+'>首页</button>';
  phtml += '<button onclick="listPage=Math.max(1,listPage-1);renderList()" '+(listPage===1?'disabled':'')+'>上一页</button>';
  for(let i=Math.max(1,listPage-3);i<=Math.min(totalPages,listPage+3);i++){
    phtml += '<button onclick="listPage='+i+';renderList()" class="'+(i===listPage?'active':'')+'">'+i+'</button>';
  }
  phtml += '<button onclick="listPage=Math.min(totalPages,listPage+1);renderList()" '+(listPage===totalPages?'disabled':'')+'>下一页</button>';
  phtml += '<button onclick="listPage='+totalPages+';renderList()" '+(listPage===totalPages?'disabled':'')+'>末页</button>';
  phtml += ' <span style="font-size:.8em;color:#999">共'+filteredWords.length+'词 '+totalPages+'页</span>';
  document.getElementById('list-pagination').innerHTML = phtml;
}

function toggleListWord(idx){
  if(knownSet.has(idx)) knownSet.delete(idx);
  else knownSet.add(idx);
  saveKnown(knownSet);
  renderList();
  updateStats();
}

// ── Chapters ──
function renderChapters(){
  let html = '';
  for(const [ch, info] of Object.entries(CHAPTERS)){
    const totalWords = info.wc;
    const chWords = WORDS.filter(w=>w.c===parseInt(ch));
    const knownWords = chWords.filter(w=>knownSet.has(w.i)).length;
    const pct = totalWords>0 ? Math.round(knownWords/totalWords*100) : 0;
    html += '<div class="ch-card" onclick="filterByChapter('+ch+')">';
    html += '<div class="ch-num">第'+ch+'章</div>';
    html += '<div class="ch-name">'+esc(info.n)+'</div>';
    html += '<div class="ch-count">'+knownWords+'/'+totalWords+' ('+pct+'%)</div>';
    html += '<div class="ch-bar"><div class="ch-bar-fill" style="width:'+pct+'%"></div></div>';
    html += '</div>';
  }
  document.getElementById('ch-grid').innerHTML = html;
}

function filterByChapter(ch){
  document.getElementById('chapter-filter').value = ch;
  switchPanel('flashcard');
  onFilterChange();
}

// ── Synonyms ──
function renderSynonyms(){
  const ch = document.getElementById('syn-chapter-select').value;
  if(!ch){document.getElementById('syn-content').innerHTML='<p style="color:#999">请选择一个章节</p>';return}

  const groups = SYNONYMS[ch] || [];
  if(groups.length===0){
    document.getElementById('syn-content').innerHTML='<p style="color:#999">该章节暂无近义词分析</p>';
    return;
  }

  let html = '';
  for(const g of groups){
    html += '<div class="syn-group" onclick="this.classList.toggle(\'open\')">';
    html += '<div class="syn-group-header"><h3>'+esc(g.gn)+' ('+g.ws.length+'个词)</h3><span class="arrow">▼</span></div>';
    html += '<div class="syn-group-body">';
    html += '<p class="syn-explanation">'+esc(g.ex)+'</p>';
    for(const wid of g.ws){
      const w = WORDS.find(x=>x.i===wid);
      if(!w) continue;
      const diff = (g.df && g.df[String(wid)]) ? g.df[String(wid)] : '';
      html += '<div class="syn-word-item">';
      html += '<span class="syn-word" onclick="event.stopPropagation();jumpToCard('+w.i+')">'+esc(w.w)+'</span>';
      html += '<span class="syn-diff">'+esc(diff)+'</span>';
      html += '</div>';
    }
    html += '</div></div>';
  }
  document.getElementById('syn-content').innerHTML = html;
}

function jumpToCard(idx){
  applyFilters();
  // Find the word in filteredWords and set currentIndex
  const pos = filteredWords.findIndex(w=>w.i===idx);
  if(pos>=0){
    shuffledIndices = [idx];
    currentIndex = 0;
  } else {
    // Word not in current filter, add it
    shuffledIndices = [idx];
    currentIndex = 0;
  }
  switchPanel('flashcard');
  renderCard();
}

// ── Stats ──
function updateStats(){
  const total = filteredWords.length;
  let knownCount = 0;
  filteredWords.forEach(w=>{if(knownSet.has(w.i)) knownCount++});
  document.getElementById('stat-total').textContent = '总计: '+total;
  document.getElementById('stat-known').textContent = '已掌握: '+knownCount+' ('+(total>0?Math.round(knownCount/total*100):0)+'%)';
  document.getElementById('stat-remain').textContent = '待复习: '+(total-knownCount);
}

// ── Reset ──
function resetProgress(){
  if(confirm('确定要重置所有学习进度吗？')){knownSet.clear();saveKnown(knownSet);applyFilters();shuffleCards();showToast('进度已重置')}
}

// ── Export/Import ──
function exportProgress(){
  const data = {date:new Date().toISOString(),total:WORDS.length,known:[...knownSet],knownCount:knownSet.size};
  const blob = new Blob([JSON.stringify(data)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ielts_zhenjing_progress.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('已导出 '+knownSet.size+' 个标记');
}
function importProgress(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(!Array.isArray(data.known)){showToast('文件格式错误');return}
      let added=0;
      data.known.forEach(i=>{if(i>=0&&i<WORDS.length){knownSet.add(i);added++}});
      saveKnown(knownSet);applyFilters();shuffleCards();
      showToast('已导入 '+added+' 个标记');
    }catch{showToast('文件解析失败')}
  };
  reader.readAsText(file);
  event.target.value='';
}

// ── Toast ──
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ── Helpers ──
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ── Keyboard ──
document.addEventListener('keydown',e=>{
  if(currentPanel!=='flashcard') return;
  if(e.key===' '||e.key==='Spacebar'){e.preventDefault();flipCard()}
  else if(e.key==='ArrowLeft'){e.preventDefault();markWord('unknown');nextCard()}
  else if(e.key==='ArrowRight'){e.preventDefault();markWord('known');nextCard()}
  else if(e.key==='ArrowDown'){e.preventDefault();nextCard()}
  else if(e.key==='ArrowUp'){e.preventDefault();prevCard()}
});

// ── Start ──
init();
</script>
