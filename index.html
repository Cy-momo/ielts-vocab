<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雅思错词练习</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f0f2f5; color: #333; min-height: 100vh;
}
header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: #fff; padding: 16px 20px;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
}
header h1 { font-size: 1.2em; white-space: nowrap; }
.stats { display: flex; gap: 16px; font-size: 0.85em; flex-wrap: wrap; }
.stats span { background: rgba(255,255,255,0.15); padding: 4px 10px; border-radius: 12px; }
nav { display: flex; gap: 6px; flex-wrap: wrap; }
nav button {
  background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2);
  padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85em;
  transition: all 0.2s;
}
nav button:hover { background: rgba(255,255,255,0.25); }
nav button.active { background: #e94560; border-color: #e94560; }

.toolbar {
  display: flex; gap: 8px; padding: 12px 20px; background: #fff;
  border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; align-items: center;
  position: sticky; top: 60px; z-index: 99;
}
.toolbar input, .toolbar select {
  padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;
  font-size: 0.9em; outline: none;
}
.toolbar input:focus, .toolbar select:focus { border-color: #0f3460; }
.toolbar input { flex: 1; min-width: 150px; }
.toolbar select { min-width: 120px; }
.toolbar button {
  padding: 8px 16px; border: 1px solid #0f3460; background: #fff;
  color: #0f3460; border-radius: 6px; cursor: pointer; font-size: 0.85em;
  transition: all 0.2s; white-space: nowrap;
}
.toolbar button:hover { background: #0f3460; color: #fff; }
.toolbar button.primary { background: #0f3460; color: #fff; }
.toolbar button.primary:hover { background: #16213e; }
.toolbar button.danger { border-color: #e94560; color: #e94560; }
.toolbar button.danger:hover { background: #e94560; color: #fff; }
.toolbar button.mode-btn { border-color: #ff9800; color: #ff9800; }
.toolbar button.mode-btn:hover { background: #ff9800; color: #fff; }
.toolbar button.mode-btn.rev { border-color: #9c27b0; color: #9c27b0; }
.toolbar button.mode-btn.rev:hover { background: #9c27b0; color: #fff; }

main { max-width: 900px; margin: 20px auto; padding: 0 16px; }

/* Flashcard View */
.card-container { perspective: 1000px; height: 260px; margin-bottom: 20px; }
.card {
  width: 100%; height: 100%; position: relative;
  transform-style: preserve-3d; transition: transform 0.5s;
  cursor: pointer;
}
.card.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden; border-radius: 16px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 30px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
.card-front { background: #fff; }
.card-front .word {
  font-size: 2.2em; font-weight: 700; color: #1a1a2e;
  text-align: center; word-break: break-word;
}
.card-front .chapter-tag {
  margin-top: 10px; font-size: 0.85em; color: #999;
  background: #f0f2f5; padding: 4px 12px; border-radius: 10px;
}
.card-back {
  background: linear-gradient(135deg, #0f3460, #16213e);
  transform: rotateY(180deg); color: #fff;
}
.card-back .meaning {
  font-size: 2em; font-weight: 600; text-align: center; word-break: break-word;
}
.card-back .word-hint {
  margin-top: 12px; font-size: 1em; opacity: 0.7;
}
.card-hint { margin-top: 12px; color: #999; font-size: 0.85em; }

.card-actions { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
.card-actions button {
  padding: 10px 24px; border-radius: 8px; border: none;
  font-size: 0.95em; cursor: pointer; transition: all 0.2s;
}
.btn-know { background: #4caf50; color: #fff; }
.btn-know:hover { background: #43a047; }
.btn-dunno { background: #ff9800; color: #fff; }
.btn-dunno:hover { background: #f57c00; }
.btn-skip { background: #9e9e9e; color: #fff; }
.btn-skip:hover { background: #757575; }
.btn-prev { background: #607d8b; color: #fff; }
.btn-prev:hover { background: #546e7a; }

.progress-bar {
  height: 6px; background: #e0e0e0; border-radius: 3px; margin-bottom: 16px;
  overflow: hidden;
}
.progress-bar .fill {
  height: 100%; background: #0f3460; border-radius: 3px; transition: width 0.3s;
}

/* List View */
.list-table { width: 100%; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.list-table table { width: 100%; border-collapse: collapse; }
.list-table th, .list-table td {
  padding: 10px 14px; text-align: left; border-bottom: 1px solid #f0f0f0;
  font-size: 0.9em;
}
.list-table th { background: #1a1a2e; color: #fff; font-weight: 500; position: sticky; top: 0; }
.list-table tr:hover td { background: #f8f9ff; }
.list-table .word-col { font-weight: 600; color: #0f3460; cursor: pointer; }
.list-table .chapter-col { color: #999; font-size: 0.85em; }
.list-table .known-row { opacity: 0.5; }
.list-table .known-row td { text-decoration: line-through; }
.list-toggle-btn {
  padding: 3px 10px; border: 1px solid #4caf50; background: #fff;
  color: #4caf50; border-radius: 4px; cursor: pointer; font-size: 0.8em;
  white-space: nowrap;
}
.list-toggle-btn:hover { background: #4caf50; color: #fff; }

/* Pagination */
.pagination { display: flex; gap: 6px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
.pagination button {
  padding: 6px 12px; border: 1px solid #ddd; background: #fff;
  border-radius: 4px; cursor: pointer; font-size: 0.85em;
}
.pagination button:hover { background: #f0f0f0; }
.pagination button.active { background: #0f3460; color: #fff; border-color: #0f3460; }

/* Panel view */
.panel { display: none; }
.panel.active { display: block; }

/* Toast */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 10px 24px; border-radius: 20px;
  font-size: 0.9em; z-index: 999; opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

@media (max-width: 600px) {
  header { padding: 12px; }
  header h1 { font-size: 1em; }
  .stats { font-size: 0.75em; gap: 8px; }
  nav button { padding: 5px 10px; font-size: 0.75em; }
  .toolbar { padding: 10px 12px; top: 50px; }
  .card-container { height: 220px; }
  .card-front .word { font-size: 1.6em; }
  .card-back .meaning { font-size: 1.5em; }
}
</style>
</head>
<body>

<header>
  <h1>IELTS 错词练习</h1>
  <div class="stats">
    <span id="stat-total">总计: 0</span>
    <span id="stat-known">已掌握: 0</span>
    <span id="stat-remain">待复习: 0</span>
  </div>
  <nav>
    <button onclick="switchPanel('flashcard')" id="nav-flashcard" class="active">卡片模式</button>
    <button onclick="switchPanel('list')" id="nav-list">列表浏览</button>
  </nav>
</header>

<div class="toolbar">
  <input type="text" id="search-input" placeholder="搜索单词或释义..." oninput="onFilterChange()">
  <select id="chapter-filter" onchange="onFilterChange()">
    <option value="">全部章节</option>
  </select>
  <select id="known-filter" onchange="onFilterChange()">
    <option value="all">全部状态</option>
    <option value="unknown">未掌握</option>
    <option value="known">已掌握</option>
  </select>
  <button class="primary" onclick="shuffleCards()">随机打乱</button>
  <button class="mode-btn" id="mode-toggle" onclick="toggleMode()">中→英</button>
	  <button onclick="exportProgress()">导出进度</button>
  <button onclick="document.getElementById('import-file').click()">导入进度</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importProgress(event)">
  <button class="danger" onclick="resetProgress()">重置进度</button>
</div>

<main>
  <!-- Flashcard Panel -->
  <div id="panel-flashcard" class="panel active">
    <div class="progress-bar"><div class="fill" id="progress-fill" style="width:0%"></div></div>
    <div class="card-container" onclick="flipCard()">
      <div class="card" id="card">
        <div class="card-face card-front">
          <div class="word" id="card-word"></div>
          <div class="chapter-tag" id="card-chapter"></div>
        </div>
        <div class="card-face card-back">
          <div class="meaning" id="card-meaning"></div>
          <div class="word-hint" id="card-word-hint"></div>
        </div>
      </div>
    </div>
    <p class="card-hint" id="card-hint">点击卡片翻转查看释义</p>
    <div class="card-actions">
      <button class="btn-prev" onclick="prevCard()">上一张</button>
      <button class="btn-dunno" onclick="markWord('unknown'); nextCard()">还不熟</button>
      <button class="btn-know" onclick="markWord('known'); nextCard()">已掌握</button>
      <button class="btn-skip" onclick="nextCard()">跳过</button>
    </div>
    <div style="text-align:center; color:#999; font-size:0.85em;">
      第 <span id="card-index">0</span> / <span id="card-total">0</span> 个
    </div>
  </div>

  <!-- List Panel -->
  <div id="panel-list" class="panel">
    <div class="list-table">
      <table>
        <thead><tr><th>单词</th><th>释义</th><th>章节</th><th>操作</th></tr></thead>
        <tbody id="list-body"></tbody>
      </table>
    </div>
    <div class="pagination" id="list-pagination"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

iday", "meaning": "冲浪假期", "chapter": "11.4"}, {"word": "specialist teacher", "meaning": "专家老师", "chapter": "11.4"}, {"word": "southern pole", "meaning": "南极", "chapter": "11.4"}, {"word": "hibernation instinct", "meaning": "冬眠本能", "chapter": "11.4"}, {"word": "pressure washer", "meaning": "压力清洗装置", "chapter": "11.4"}, {"word": "professional athlete", "meaning": "专业运动员", "chapter": "11.4"}, {"word": "table tennis bats", "meaning": "乒乓球拍", "chapter": "11.4"}, {"word": "horse harnesses", "meaning": "马具", "chapter": "11.4"}, {"word": "bread slicer", "meaning": "面包切片刀", "chapter": "11.4"}, {"word": "thermal gloves", "meaning": "隔热手套", "chapter": "11.4"}, {"word": "taster session", "meaning": "试听课", "chapter": "11.4"}, {"word": "continuous process", "meaning": "持续的过程", "chapter": "11.4"}, {"word": "technical competence", "meaning": "技术能力", "chapter": "11.4"}, {"word": "emergency situations", "meaning": "紧急情况", "chapter": "11.4"}, {"word": "vegan alternative", "meaning": "素食替代品", "chapter": "11.4"}, {"word": "recycling bins", "meaning": "回收箱", "chapter": "11.4"}, {"word": "experimental mice", "meaning": "实验小鼠", "chapter": "11.4"}, {"word": "physical traits", "meaning": "身体特征，物理特征", "chapter": "11.4"}, {"word": "conservation status", "meaning": "保护状态", "chapter": "11.4"}, {"word": "shower gel", "meaning": "沐浴露", "chapter": "11.4"}, {"word": "facial cleanser", "meaning": "洗面奶", "chapter": "11.4"}, {"word": "business corporation", "meaning": "商业公司", "chapter": "11.4"}];
// Add index to each word for fast lookup
WORDS.forEach((w, i) => w._i = i);

// ── localStorage ──
const STORAGE_KEY = 'ielts_vocab_known_v2';
function loadKnown() {
  try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)) || []); }
  catch { return new Set(); }
}
function saveKnown(set) { localStorage.setItem(STORAGE_KEY, JSON.stringify([...set])); }

let knownSet = loadKnown();
let currentPanel = 'flashcard';
let currentIndex = 0;
let filteredWords = [...WORDS];
let shuffledIndices = [];

// List view state
let listPage = 1;
const PAGE_SIZE = 50;
let reverseMode = false;

// ── Mode Toggle ──
function toggleMode() {
  reverseMode = !reverseMode;
  const btn = document.getElementById('mode-toggle');
  const hint = document.getElementById('card-hint');
  if (reverseMode) {
    btn.textContent = '英→中';
    btn.classList.add('rev');
    hint.textContent = '点击卡片翻转查看英文';
  } else {
    btn.textContent = '中→英';
    btn.classList.remove('rev');
    hint.textContent = '点击卡片翻转查看释义';
  }
  // Re-render current card
  if (currentPanel === 'flashcard') renderCard();
}

// ── Init ──
function init() {
  populateChapters();
  applyFilters();
  shuffleCards();
  updateStats();
}
function populateChapters() {
  const sel = document.getElementById('chapter-filter');
  const chapters = [...new Set(WORDS.map(w => w.chapter).filter(Boolean))].sort();
  chapters.forEach(ch => { const o = document.createElement('option'); o.value = ch; o.textContent = ch; sel.appendChild(o); });
}

// ── Filters ──
function applyFilters() {
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  const chapter = document.getElementById('chapter-filter').value;
  const known = document.getElementById('known-filter').value;

  filteredWords = WORDS.filter((w) => {
    if (query && !w.word.toLowerCase().includes(query) && !w.meaning.includes(query)) return false;
    if (chapter && w.chapter !== chapter) return false;
    if (known === 'known' && !knownSet.has(w._i)) return false;
    if (known === 'unknown' && knownSet.has(w._i)) return false;
    return true;
  });
}

function onFilterChange() {
  applyFilters();
  if (currentPanel === 'flashcard') { shuffleCards(); }
  else { listPage = 1; renderList(); }
  updateStats();
}

// ── Card Mode ──
function shuffleCards() {
  shuffledIndices = filteredWords.map(w => w._i).sort(() => Math.random() - 0.5);
  currentIndex = 0;
  renderCard();
}

function renderCard() {
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  document.getElementById('card-hint').style.display = '';

  if (shuffledIndices.length === 0) {
    document.getElementById('card-word').textContent = '没有匹配的单词';
    document.getElementById('card-chapter').textContent = '';
    document.getElementById('card-meaning').textContent = '';
    document.getElementById('card-word-hint').textContent = '';
    document.getElementById('card-index').textContent = '0';
    document.getElementById('card-total').textContent = '0';
    document.getElementById('progress-fill').style.width = '0%';
    return;
  }

  if (currentIndex >= shuffledIndices.length) currentIndex = 0;

  const idx = shuffledIndices[currentIndex];
  const w = WORDS[idx];
  if (reverseMode) {
    document.getElementById('card-word').textContent = w.meaning;
    document.getElementById('card-meaning').textContent = w.word;
    document.getElementById('card-word-hint').textContent = w.meaning;
  } else {
    document.getElementById('card-word').textContent = w.word;
    document.getElementById('card-meaning').textContent = w.meaning;
    document.getElementById('card-word-hint').textContent = w.word;
  }
  document.getElementById('card-chapter').textContent = w.chapter;
  document.getElementById('card-index').textContent = currentIndex + 1;
  document.getElementById('card-total').textContent = shuffledIndices.length;

  const total = shuffledIndices.length;
  const known = shuffledIndices.filter(i => knownSet.has(i)).length;
  document.getElementById('progress-fill').style.width = total > 0 ? (known / total * 100) + '%' : '0%';
  updateStats();
}

function flipCard() {
  if (shuffledIndices.length === 0) return;
  const card = document.getElementById('card');
  card.classList.toggle('flipped');
  document.getElementById('card-hint').style.display = card.classList.contains('flipped') ? 'none' : '';
}

function markWord(status) {
  if (shuffledIndices.length === 0) return;
  const idx = shuffledIndices[currentIndex];
  if (status === 'known') { knownSet.add(idx); }
  else { knownSet.delete(idx); }
  saveKnown(knownSet);
}

function prevCard() {
  if (shuffledIndices.length === 0) return;
  if (currentIndex > 0) {
    currentIndex--;
    renderCard();
  }
}

function nextCard() {
  if (shuffledIndices.length === 0) return;
  currentIndex++;
  if (currentIndex >= shuffledIndices.length) {
    showToast('本轮已完成，重新打乱中...');
    applyFilters();
    shuffleCards();
    return;
  }
  renderCard();
}

// ── List Mode ──
function toggleListWord(idx) {
  if (knownSet.has(idx)) { knownSet.delete(idx); }
  else { knownSet.add(idx); }
  saveKnown(knownSet);
  renderList();
  updateStats();
}

function renderList() {
  const tbody = document.getElementById('list-body');
  const totalPages = Math.ceil(filteredWords.length / PAGE_SIZE);
  if (listPage > totalPages) listPage = Math.max(1, totalPages);

  const start = (listPage - 1) * PAGE_SIZE;
  const pageWords = filteredWords.slice(start, start + PAGE_SIZE);

  tbody.innerHTML = pageWords.map(w => {
    const isKnown = knownSet.has(w._i);
    return `<tr class="${isKnown ? 'known-row' : ''}">
      <td class="word-col" onclick="showFlashcardFor(${w._i})">${esc(w.word)}</td>
      <td>${esc(w.meaning)}</td>
      <td class="chapter-col">${esc(w.chapter)}</td>
      <td><button class="list-toggle-btn" onclick="event.stopPropagation();toggleListWord(${w._i})">${isKnown ? '✓ 已掌握' : '标记掌握'}</button></td>
    </tr>`;
  }).join('');

  // Pagination
  const pag = document.getElementById('list-pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  let html = '';
  for (let p = 1; p <= totalPages; p++) {
    html += `<button class="${p === listPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
  }
  pag.innerHTML = html;
}

function goPage(p) { listPage = p; renderList(); }

function showFlashcardFor(idx) {
  switchPanel('flashcard');
  const pos = shuffledIndices.indexOf(idx);
  if (pos >= 0) { currentIndex = pos; }
  else { shuffledIndices = [idx]; currentIndex = 0; }
  renderCard();
}

// ── Panel Switch ──
function switchPanel(name) {
  currentPanel = name;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'flashcard') { renderCard(); }
  else { listPage = 1; renderList(); }
}

// ── Stats ──
function updateStats() {
  const total = filteredWords.length;
  let knownCount = 0;
  filteredWords.forEach(w => { if (knownSet.has(w._i)) knownCount++; });
  document.getElementById('stat-total').textContent = '总计: ' + total;
  document.getElementById('stat-known').textContent = '已掌握: ' + knownCount + ' (' + (total > 0 ? Math.round(knownCount / total * 100) : 0) + '%)';
  document.getElementById('stat-remain').textContent = '待复习: ' + (total - knownCount);
}

// ── Reset ──
function resetProgress() {
  if (confirm('确定要重置所有学习进度吗？此操作不可撤销。')) {
    knownSet.clear();
    saveKnown(knownSet);
    applyFilters();
    shuffleCards();
    showToast('进度已重置');
  }
}

// ── Export/Import ──
function exportProgress() {
  const data = { date: new Date().toISOString(), total: WORDS.length, known: [...knownSet], knownCount: knownSet.size };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ielts_vocab_progress.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('进度已导出 (' + knownSet.size + ' 个已掌握)');
}

function importProgress(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data.known)) { showToast('文件格式错误'); return; }
      const newKnown = new Set(data.known);
      // Verify indices are valid
      let valid = 0, invalid = 0;
      for (const i of newKnown) {
        if (i >= 0 && i < WORDS.length) { knownSet.add(i); valid++; }
        else { invalid++; }
      }
      saveKnown(knownSet);
      applyFilters();
      shuffleCards();
      showToast('已导入 ' + valid + ' 个标记' + (invalid > 0 ? '，跳过 ' + invalid + ' 个无效' : ''));
    } catch { showToast('文件解析失败'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Helpers ──
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Key bindings ──
document.addEventListener('keydown', e => {
  if (currentPanel !== 'flashcard') return;
  if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); flipCard(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); markWord('unknown'); nextCard(); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); markWord('known'); nextCard(); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); nextCard(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); prevCard(); }
});

init();
</script>
